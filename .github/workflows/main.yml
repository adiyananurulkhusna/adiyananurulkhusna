name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent Name"
        required: true
        default: "adiyaman"
      agent_description:
        description: "Agent Description"
        required: true
        default: "adiyaman AI Agent"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ClawHub skill
        run: npx clawhub@latest install verified-agent-identity

      - name: Install dependencies
        run: |
          if [ -d "scripts" ]; then
            cd scripts
            npm install
          else
            echo "Folder scripts tidak ditemukan"
            exit 1
          fi

      - name: Create Ethereum Identity
        run: |
          if [ -f "scripts/createNewEthereumIdentity.js" ]; then
            node scripts/createNewEthereumIdentity.js
          else
